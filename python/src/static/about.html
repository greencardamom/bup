<center><font size="+2">BUP - Books Up! About page</font></center><br><br>
<p><center>Books Up! adds external links to book citations on Wikipedia based on ISBN and non-ISBN matching techniques with external libraries.</center><p><br><br>
<!--
<p><font size="+1">How it works</font>
<p>Articles have been pre-processed to match citations with books. The new citation is saved in a database, but not uploaded to Wikipedia yet. The interface presents a list of articles based on the pre-processed information, sorted by highest counts first. When running the bot or analyzing (previewing) an article, it may find a discrepency between what actually exists in the article right now vs. pre-processed. This can occur if a citation has been edited since it was last processed. Thus the number of books added may be less than what is listed in the /main.html view. When running the bot, the new citations are uploaded to Wikipedia.
