<!DOCTYPE HTML>
<html>
    <head>
        <title>Book Linker</title>
    </head>
    <body>
        {% if username %}
        <p>Logged in as: {{ username }} (click to <a href="{{ url_for('logout') }}">logout</a>)</p>
        <p>Click to <a href="{{ url_for('edit') }}">edit</a> User:GreenC/sandbox</p>
        {% else %}
        <p>{{ greeting }}</p>
        <p><a href="{{ url_for('login') }}">Login</a> automatically via your MediaWiki account</p>
        {% endif %}
    </body>
</html>
